[env:nodemcu-32s]
platform  = espressif32
board     = nodemcu-32s
framework = arduino

monitor_speed   = 115200
; Automatically decode ESP32 stack traces in the monitor
monitor_filters = esp32_exception_decoder

build_flags =
    ; Enable lwIP NAT/NAPT support.
    ; IP_NAPT=1  → the macro our code checks with #if IP_NAPT
    ; The three LWIP_ flags below tell the lwIP build system to compile
    ; the relevant features in.
    -D IP_NAPT=1
    -D LWIP_IPV4=1
    -D LWIP_FEATURES=1
